name: Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Version tag (e.g. v1.2.3)"
        required: true

jobs:
  release:
    name: Build & Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

      - name: Resolve version
        id: version
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF_NAME}"
          fi
          # Strip leading "v" to get plain semver (e.g. 1.2.3)
          VERSION="${TAG#v}"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Patch manifest.json version
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          # Replace "version": "x.y.z" with the release version
          sed -i "s/\"version\": \"[^\"]*\"/\"version\": \"${VERSION}\"/" manifest.json
          echo "manifest.json version set to ${VERSION}"
          grep '"version"' manifest.json

      - name: Package extension
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          ZIP_NAME="okteto-extension-${TAG}.zip"
          zip -r "${ZIP_NAME}" \
            manifest.json \
            background.js \
            popup.js \
            popup.html \
            popup.css \
            api.js \
            icons/
          echo "zip_name=${ZIP_NAME}" >> "$GITHUB_ENV"
          echo "Packaged: ${ZIP_NAME}"
          unzip -l "${ZIP_NAME}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Okteto Extension ${{ steps.version.outputs.tag }}"
          generate_release_notes: true
          files: ${{ env.zip_name }}
          body: |
            ## Installation

            1. Download **`${{ env.zip_name }}`** from the assets below.
            2. Unzip the file.
            3. Open Chrome and go to `chrome://extensions`.
            4. Enable **Developer mode** (top-right toggle).
            5. Click **Load unpacked** and select the unzipped folder.

            ---
            *Release notes are auto-generated from commits since the last release.*
